# Container-appropriate defaults. The image bakes this at
# /etc/dnsink/config.toml; override with a bind-mount to customize:
#
#   docker run -v /path/to/my-config.toml:/etc/dnsink/config.toml:ro ...

[listen]
# 0.0.0.0 so the container is reachable; 5353 avoids requiring
# NET_BIND_SERVICE on the nonroot distroless user. Map to host 53 via
# `-p 53:5353/udp -p 53:5353/tcp`.
address = "0.0.0.0"
port = 5353

[upstream]
address = "1.1.1.1"
port = 53
timeout_ms = 5000

[feeds]
urlhaus = true
openphish = true
refresh_secs = 3600

[tunneling_detection]
enabled = true
entropy_threshold = 3.5
min_subdomain_length = 20

[tunneling_detection.cdn_whitelist]
enabled = true
providers = ["aws", "akamai", "cloudflare"]

[metrics]
enabled = true
bind_addr = "0.0.0.0:9090"
